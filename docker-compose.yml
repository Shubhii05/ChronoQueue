version: "3.8"

services:

  postgres:
    image: postgres:15
    container_name: taskqueue-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: taskqueue
    ports:
      - "5432:5432"
    volumes:
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  redis:
    image: redis:7
    container_name: taskqueue-redis
    ports:
      - "6379:6379"

  api:
    build:
      context: ./api
    container_name: taskqueue-api
    ports:
      - "5000:5000"
    depends_on:
      - redis
      - postgres

  worker:
    build:
      context: ./worker
    container_name: taskqueue-worker
    depends_on:
      - redis
      - postgres