services:

  postgres:
    image: postgres:15
    container_name: taskqueue-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: taskqueue
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d taskqueue"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: taskqueue-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./api
    container_name: taskqueue-api
    environment:
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      SUPABASE_BUCKET: ${SUPABASE_BUCKET:-videos}
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-524288000}
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker_1:
    build:
      context: ./worker
    environment:
      WORKER_NAME: worker_alpha
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker_2:
    build:
      context: ./worker
    environment:
      WORKER_NAME: worker_beta
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker_3:
    build:
      context: ./worker
    environment:
      WORKER_NAME: worker_gamma
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
